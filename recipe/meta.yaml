{% set name = "pycatflow" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pycatflow-{{ version }}.tar.gz
  sha256: 6354ec275cfa4d83d5cba411cfffbc97255c9e758c01c50ea2593677bae93f30

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - drawsvg <2.0
    - matplotlib-base <3.9
    - python >={{ python_min }}

test:
  imports:
    - pycatflow
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bumatic/PyCatFlow
  summary: A tool for visualizing categorical data over time.
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - thewchan
