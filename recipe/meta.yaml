{% set name = "pycatflow" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pycatflow-{{ version }}.tar.gz
  sha256: 3b99a7ef07fb8eaa08f992b754d9c97933e72cde4b48ab861c1fa41259252c93

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - drawsvg >=2.0
    - matplotlib-base
    - python >={{ python_min }}

test:
  imports:
    - pycatflow
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bumatic/PyCatFlow
  summary: A tool for visualizing categorical data over time.
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - thewchan
